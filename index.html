<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=">
       <title>Student Score Marks</title>
       <link rel="stylesheet" href="style.css">
</head>

<main>
   <div class="Mark-Scale">
      <h2>Enter Student Name & Marks</h2>

             <!-----------Student Name Input-------------->
                <label for="name">Enter Student Name:</label>
                <input type="text" id="name" placeholder="Enter student name here.." required>

            <!--------------Student Mark Input------------->
                <label for="mark">Enter Student Marks:</label>
                <input type="number" id="mark" placeholder="Enter student mark here.." min="0" max="100" required>

            <!-----------Submit Button--------------------->
               <button type="Submit" onclick="submitStudent()">Submit</button>

            <!------------Results Found--------------------> 
        <div id="results"></div>
   </div>

   <!--------------Results Output----------------->
    <div class="resultsList">
       <h3>Students Results</h3>
           <ul id="list">
               <li id="message">
                 
              </li>
           </ul>
    </div>
</main>
</html>
